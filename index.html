<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>날짜별 인원 교육장 통보 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;background:#0f0e1a;color:#e8e6ff;min-height:100vh;}
.app{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
.L{padding:20px 16px;background:#1a1830;border-right:1px solid #3730a3;overflow-y:auto;max-height:100vh;}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #2f2c52;}
.hico{width:40px;height:40px;background:#3730a3;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr h1{font-size:15px;font-weight:700;}.hdr p{font-size:11px;color:#9490c4;margin-top:2px;}
.stitle{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#818cf8;margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#3730a3,transparent);}
.card{background:#252340;border:1px solid #2f2c52;border-radius:10px;padding:14px;margin-bottom:12px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.f1{grid-template-columns:1fr!important;}
.flabel{display:block;font-size:11px;color:#9490c4;font-weight:600;letter-spacing:.5px;margin-bottom:5px;}
.finput{width:100%;background:#2f2c52;border:1px solid #3d3a6e;border-radius:7px;padding:8px 11px;color:#e8e6ff;font-family:inherit;font-size:13px;outline:none;transition:border .2s;display:block;}
.finput:focus{border-color:#4f46e5;}
input[type=number].finput{text-align:center;padding:8px 4px;}
.stepper{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sb{width:32px;height:32px;border-radius:7px;border:1px solid #3730a3;background:#2f2c52;color:#e8e6ff;font-size:20px;line-height:1;cursor:pointer;transition:background .15s;font-family:inherit;flex-shrink:0;}
.sb:hover{background:#4f46e5;}
.sv{font-size:20px;font-weight:700;color:#f59e0b;min-width:26px;text-align:center;}
.sl{font-size:12px;color:#9490c4;}
.hall-item{display:grid;grid-template-columns:12px 1fr auto;gap:8px;align-items:center;background:#2f2c52;border-radius:7px;padding:9px 10px;margin-bottom:7px;border-left:3px solid;}
.hdot{width:10px;height:10px;border-radius:50%;display:block;}
.hni{background:transparent;border:none;color:#e8e6ff;font-family:inherit;font-size:13px;font-weight:500;outline:none;width:100%;}
.hbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.dtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.dtab{padding:6px 13px;border-radius:7px;border:1px solid #2f2c52;background:#2f2c52;color:#9490c4;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.dtab.on{background:#4f46e5;border-color:#4f46e5;color:#fff;}
.dtab:hover:not(.on){border-color:#4f46e5;color:#e8e6ff;}
.dpanel{display:none;}.dpanel.on{display:block;}
.totbar{display:flex;align-items:center;justify-content:space-between;background:#1e1b4b;border:1px solid #4f46e5;border-radius:8px;padding:9px 13px;margin-top:10px;}
.tlbl{font-size:12px;color:#9490c4;font-weight:600;}
.tval{font-size:22px;font-weight:900;color:#f59e0b;}
.tunit{font-size:12px;color:#9490c4;}

/* ── 강의장 블록 ── */
.hall-block{background:#1e1b3a;border:1px solid #2f2c52;border-radius:9px;margin-bottom:10px;overflow:hidden;}
.hall-block-header{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#252350;border-bottom:1px solid #2f2c52;}
.hall-block-name{font-size:13px;font-weight:700;color:#c7d2fe;flex:1;}
.hall-block-tot{font-size:12px;font-weight:700;color:#f59e0b;}
.hall-block-body{padding:10px 12px;}

/* 부 구분 */
.shift-section{margin-bottom:8px;}
.shift-label{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:5px;display:inline-block;margin-bottom:6px;}
.shift-label.s1{background:#1e3a8a;color:#93c5fd;}
.shift-label.s2{background:#14532d;color:#86efac;}

/* 과 행: [과번호 버튼] [인원 입력] */
.ka-row{display:grid;grid-template-columns:auto 1fr;gap:6px;align-items:center;margin-bottom:5px;}
.ka-btns{display:flex;gap:4px;flex-wrap:wrap;}
.ka-btn{padding:4px 9px;border-radius:6px;border:1px solid #3d3a6e;background:#2f2c52;color:#9490c4;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.ka-btn.on{background:#4f46e5;border-color:#4f46e5;color:#fff;}
.ka-btn.on.s2{background:#059669;border-color:#059669;}
.ka-inp{background:#2f2c52;border:1px solid #3d3a6e;border-radius:6px;padding:6px 8px;color:#e8e6ff;font-family:inherit;font-size:13px;outline:none;text-align:center;width:100%;transition:border .2s;}
.ka-inp:focus{border-color:#4f46e5;}
.ka-inp.s2:focus{border-color:#059669;}
.ka-inp.s1b{border-color:#4338ca44;}
.ka-inp.s2b{border-color:#05966944;}
.ka-placeholder{font-size:12px;color:#5c5890;padding:4px 0;}

/* 담당자 */
.srow{display:grid;grid-template-columns:1fr 1fr 70px auto;gap:7px;align-items:center;margin-bottom:7px;}
.rmbtn{width:28px;height:28px;border-radius:6px;border:1px solid #7f1d1d;background:#2d1515;color:#f87171;cursor:pointer;font-size:13px;font-family:inherit;}
.rmbtn:hover{background:#450a0a;}
.addbtn{width:100%;padding:9px;border-radius:7px;border:1px dashed #3730a3;background:transparent;color:#9490c4;font-size:12px;font-family:inherit;cursor:pointer;margin-top:5px;transition:all .15s;display:block;}
.addbtn:hover{border-color:#4f46e5;color:#818cf8;}
.genbtn{width:100%;padding:14px;border-radius:10px;border:none;background:#3730a3;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s;display:block;}
.genbtn:hover{background:#4f46e5;}

/* RIGHT */
.R{background:#12111e;display:flex;flex-direction:column;max-height:100vh;}
.rtbar{padding:13px 18px;border-bottom:1px solid #2f2c52;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rtitle{font-size:11px;font-weight:700;color:#9490c4;letter-spacing:1px;}
.ract{display:flex;gap:7px;}
.tbtn{padding:7px 13px;border-radius:7px;border:1px solid #2f2c52;background:#1a1830;color:#9490c4;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s;}
.tbtn:hover{background:#2f2c52;color:#e8e6ff;}
.tbtn.bl{background:#3730a3;border-color:#4f46e5;color:#fff;}
.tbtn.bl:hover{background:#4f46e5;}
.vtabs{display:flex;border-bottom:1px solid #2f2c52;flex-shrink:0;}
.vtab{padding:9px 18px;font-size:12px;font-weight:600;color:#5c5890;cursor:pointer;font-family:inherit;border:none;border-bottom:2px solid transparent;background:transparent;transition:all .15s;}
.vtab.on{color:#818cf8;border-bottom-color:#4f46e5;}
.rcont{flex:1;overflow-y:auto;padding:18px;}
.prev-wrap{background:#f3f4f6;border-radius:10px;overflow:hidden;}
.codebox{font-family:‘Courier New’,Consolas,monospace;font-size:11px;color:#a5b4fc;background:#252340;border-radius:10px;padding:16px;white-space:pre-wrap;word-break:break-all;line-height:1.7;}
.empty{text-align:center;padding:70px 30px;color:#5c5890;font-size:14px;line-height:2;}
.emico{font-size:50px;margin-bottom:14px;}
.toast{position:fixed;bottom:20px;right:20px;background:#059669;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
@media(max-width:800px){.app{grid-template-columns:1fr;}.L{max-height:none;}.R{max-height:80vh;}}

/* ── 관리탭 추가 스타일 ── */
.mgmt-wrap{display:none;flex-direction:column;gap:12px;}
.mgmt-wrap.on{display:flex;}
.mgmt-empty{text-align:center;padding:50px 20px;color:#5c5890;font-size:13px;line-height:2;}
.mgmt-card{background:#252340;border:1px solid #2f2c52;border-radius:10px;overflow:hidden;}
.mgmt-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1e1b4b;border-bottom:1px solid #2f2c52;gap:8px;}
.mgmt-card-title{font-size:13px;font-weight:700;color:#c7d2fe;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mgmt-card-date{font-size:11px;color:#9490c4;white-space:nowrap;}
.mgmt-card-acts{display:flex;gap:6px;flex-shrink:0;}
.mgmt-btn{padding:5px 11px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.mgmt-btn.view{background:#3730a3;color:#fff;}
.mgmt-btn.view:hover{background:#4f46e5;}
.mgmt-btn.dl{background:#1e3a5f;color:#93c5fd;}
.mgmt-btn.dl:hover{background:#1d4ed8;color:#fff;}
.mgmt-btn.del{background:#2d1515;color:#f87171;border:1px solid #7f1d1d;}
.mgmt-btn.del:hover{background:#450a0a;}
.mgmt-card-body{padding:10px 14px;font-size:12px;color:#9490c4;display:flex;gap:16px;flex-wrap:wrap;}
.mgmt-tag{background:#2f2c52;border-radius:6px;padding:3px 9px;font-size:11px;color:#818cf8;}
.save-btn-wrap{margin-top:6px;}
.savebtn{width:100%;padding:11px;border-radius:10px;border:1px solid #059669;background:#064e3b;color:#34d399;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:block;}
.savebtn:hover{background:#059669;color:#fff;}
</style>

</head>
<body>
<div class="app">
<div class="L">
  <div class="hdr"><div class="hico">&#128226;</div><div><h1>날짜별 인원 교육장 통보</h1><p>입력 후 우측에서 HTML 메일 미리보기</p></div></div>

  <div class="stitle">기본 정보</div>
  <div class="card">
    <div class="fr">
      <div><span class="flabel">교육부서</span><input type="text" id="f_dept" class="finput" value="LNG 공사부"></div>
      <div><span class="flabel">교육시작일</span><input type="date" id="f_ndate" class="finput"></div>
    </div>
    <div class="fr f1" style="margin-bottom:10px"><div><span class="flabel">교육 제목</span><input type="text" id="f_title" class="finput" value="자체교육 편성건"></div></div>
    <div class="fr">
      <div><span class="flabel">교육 시작일</span><input type="date" id="f_start" class="finput"></div>
      <div><span class="flabel">교육 종료일</span><input type="date" id="f_end" class="finput"></div>
    </div>
    <div class="fr f1" style="margin-bottom:0"><div><span class="flabel">안내 메모 (선택)</span><input type="text" id="f_notice" class="finput" value="교육 시작 전 해당 교육장에 10분 전 도착해 주시기 바랍니다."></div></div>
  </div>

  <div class="stitle">강의장 설정</div>
  <div class="card">
    <div class="stepper">
      <button class="sb" id="hMinus">&#8722;</button><span class="sv" id="hcnt">3</span><span class="sl">개 강의장 (최대 5개)</span><button class="sb" id="hPlus">&#43;</button>
    </div>
    <div id="hallList"></div>
  </div>

  <div class="stitle">교육 일자 설정</div>
  <div class="card">
    <div class="stepper">
      <button class="sb" id="dMinus">&#8722;</button><span class="sv" id="dcnt">4</span><span class="sl">일 (최대 5일)</span><button class="sb" id="dPlus">&#43;</button>
    </div>
    <div class="dtabs" id="dtabs"></div>
    <div id="dpanels"></div>
  </div>

  <div class="stitle">과별 담당자</div>
  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr 70px auto;gap:7px;margin-bottom:6px;">
      <span class="flabel" style="margin:0">부서</span><span class="flabel" style="margin:0">담당자</span><span class="flabel" style="margin:0">직책</span><span></span>
    </div>
    <div id="staffList"></div>
    <button class="addbtn" id="addStaffBtn">&#65291; 담당자 추가</button>
  </div>
  <button class="genbtn" id="genBtn">&#128276; 통보문 생성하기</button>
  <div class="save-btn-wrap"><button class="savebtn" id="saveBtn">&#128190; 현재 통보문 저장</button></div>
</div>

<div class="R">
  <div class="rtbar">
    <span class="rtitle">&#128231; 이메일 미리보기</span>
    <div class="ract">
      <button class="tbtn" id="cpBtn">&#128203; HTML 복사</button>
      <button class="tbtn bl" id="dlBtn">&#8681; 다운로드</button>
    </div>
  </div>
  <div class="vtabs">
    <button class="vtab on" id="vt_preview">미리보기</button>
    <button class="vtab" id="vt_code">HTML 코드</button>
    <button class="vtab" id="vt_mgmt">&#128193; 관리</button>
  </div>
  <div class="rcont" id="rcont">
    <div class="empty"><div class="emico">&#128203;</div>왼쪽에서 정보를 입력 후<br><strong>통보문 생성하기</strong>를 클릭하세요.</div>
  </div>
  <div class="rcont" id="mgmtCont" style="display:none">
    <div class="mgmt-wrap on" id="mgmtList"></div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
var HCOLS=['#818cf8','#34d399','#fbbf24','#f87171','#c084fc'];
var HECS =['#4338ca','#059669','#d97706','#dc2626','#7c3aed'];
var HDEF =['LNG관 3층 교육장','외업 2관 3층 교육장','목업장 2층 교육장','LNG 2층 A교육장','LNG 2층 C교육장'];
var WD   =['일','월','화','수','목','금','토'];
var MAX_KA=5; // 최대 과 수
var HC=3,DC=4,aD=0,gHTML='',cvtab='preview';

document.addEventListener('DOMContentLoaded',function(){
  var today=new Date();
  gi('f_ndate').value=fd(today);
  var s=new Date(today);s.setDate(s.getDate()+5);gi('f_start').value=fd(s);
  var e=new Date(s);e.setDate(e.getDate()+4);gi('f_end').value=fd(e);
  renderH();renderD();
  addStaff('1부1과','서정민','프로');
  addStaff('1부2과','김균호','프로');
  gi('hMinus').addEventListener('click',function(){chH(-1);});
  gi('hPlus').addEventListener('click',function(){chH(1);});
  gi('dMinus').addEventListener('click',function(){chD(-1);});
  gi('dPlus').addEventListener('click',function(){chD(1);});
  gi('addStaffBtn').addEventListener('click',function(){addStaff('','','프로');});
  gi('genBtn').addEventListener('click',gen);
  gi('cpBtn').addEventListener('click',cpHTML);
  gi('dlBtn').addEventListener('click',dlHTML);
  gi('vt_preview').addEventListener('click',function(){sVtab('preview',this);});
  gi('vt_code').addEventListener('click',function(){sVtab('code',this);});
});

function gi(id){return document.getElementById(id);}
function fd(d){return d.toISOString().split('T')[0];}
function xss(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function iv(id){return parseInt((gi(id)||{value:''}).value)||0;}

/* ──────────── 강의장 ──────────── */
function chH(d){var n=HC+d;if(n<1||n>5)return;HC=n;gi('hcnt').textContent=HC;renderH();rebuildDateHalls();}

function getHallName(i){
  var el=gi('hn_'+i);
  return(el&&el.value.trim())||HDEF[i]||'강의장'+(i+1);
}

function renderH(){
  var el=gi('hallList');el.innerHTML='';
  for(var i=0;i<HC;i++){
    var prev=getHallName(i);
    var div=document.createElement('div');
    div.className='hall-item';div.style.borderLeftColor=HCOLS[i];
    div.innerHTML='<span class="hdot" style="background:'+HCOLS[i]+'"></span>'+
      '<input class="hni" id="hn_'+i+'" type="text" value="'+xss(prev)+'" placeholder="강의장 이름">'+
      '<span class="hbadge" style="background:'+HCOLS[i]+'22;color:'+HCOLS[i]+'">강의장 '+(i+1)+'</span>';
    el.appendChild(div);
    (function(idx){
      var inp=gi('hn_'+idx);
      if(inp)inp.addEventListener('input',function(){syncHallNames();});
    })(i);
  }
}

function syncHallNames(){
  for(var d=0;d<DC;d++){
    for(var h=0;h<HC;h++){
      var el=gi('hlbl_'+d+'_'+h);
      if(el)el.textContent=getHallName(h);
    }
  }
}

/* ──────────── 일자 탭 ──────────── */
function chD(d){var n=DC+d;if(n<1||n>5)return;DC=n;if(aD>=DC)aD=DC-1;gi('dcnt').textContent=DC;renderD();}

/*
  State per cell: {s1:{ka:[bool*5], pp:[num*5]}, s2:{ka:[bool*5], pp:[num*5]}}
  ka = 과 선택 여부 (1과~5과)
  pp = 해당 과의 인원
*/
function saveState(){
  var s={dates:[],cells:[]};
  for(var d=0;d<5;d++){
    s.dates[d]=gi('di_'+d)?gi('di_'+d).value:'';
    s.cells[d]=[];
    for(var h=0;h<5;h++){
      var cell={s1:{ka:[],pp:[]},s2:{ka:[],pp:[]}};
      for(var k=1;k<=MAX_KA;k++){
        cell.s1.ka.push(!!(gi('s1ka_'+d+'_'+h+'_'+k)&&gi('s1ka_'+d+'_'+h+'_'+k).classList.contains('on')));
        cell.s1.pp.push(iv('s1pp_'+d+'_'+h+'_'+k));
        cell.s2.ka.push(!!(gi('s2ka_'+d+'_'+h+'_'+k)&&gi('s2ka_'+d+'_'+h+'_'+k).classList.contains('on')));
        cell.s2.pp.push(iv('s2pp_'+d+'_'+h+'_'+k));
      }
      s.cells[d][h]=cell;
    }
  }
  return s;
}

function renderD(){
  var sv=saveState();
  gi('dtabs').innerHTML='';gi('dpanels').innerHTML='';
  for(var d=0;d<DC;d++){
    // tab
    var t=document.createElement('button');
    t.className='dtab'+(d===aD?' on':'');t.id='dtab_'+d;t.textContent=(d+1)+'일차';
    (function(dd){t.addEventListener('click',function(){sDtab(dd);});})(d);
    gi('dtabs').appendChild(t);

    // panel
    var dv=sv.dates[d]||'';
    var panel=document.createElement('div');
    panel.className='dpanel'+(d===aD?' on':'');panel.id='dp_'+d;

    // 날짜 + 합계
    var topRow=document.createElement('div');topRow.className='fr';topRow.style.marginBottom='10px';
    topRow.innerHTML=
      '<div><span class="flabel">날짜</span><input type="date" id="di_'+d+'" class="finput" value="'+xss(dv)+'"></div>'+
      '<div style="display:flex;flex-direction:column;justify-content:flex-end">'+
        '<div class="totbar"><span class="tlbl">합계</span><span><span class="tval" id="tot_'+d+'">0</span> <span class="tunit">명</span></span></div>'+
      '</div>';
    panel.appendChild(topRow);

    // 강의장별 블록
    for(var h=0;h<HC;h++){
      panel.appendChild(makeHallBlock(d,h,sv.cells[d][h]));
    }

    gi('dpanels').appendChild(panel);
    (function(dd){var inp=gi('di_'+dd);if(inp)inp.addEventListener('change',function(){updTab(dd,this.value);});})(d);
    if(dv)updTab(d,dv);
    calcT(d);
  }
}

/* 강의장 블록 생성 */
function makeHallBlock(d,h,cellSv){
  var block=document.createElement('div');
  block.className='hall-block';
  block.id='hblock_'+d+'_'+h;

  var hdr=document.createElement('div');
  hdr.className='hall-block-header';
  hdr.innerHTML=
    '<span class="cdot" style="background:'+HCOLS[h]+';width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0"></span>'+
    '<span class="hall-block-name" id="hlbl_'+d+'_'+h+'">'+xss(getHallName(h))+'</span>'+
    '<span class="hall-block-tot" id="htot_'+d+'_'+h+'">0명</span>';
  block.appendChild(hdr);

  var body=document.createElement('div');
  body.className='hall-block-body';

  // 1부 섹션
  var s1sec=makeShiftSection(d,h,1,cellSv?cellSv.s1:{ka:[],pp:[]});
  body.appendChild(s1sec);
  // 2부 섹션
  var s2sec=makeShiftSection(d,h,2,cellSv?cellSv.s2:{ka:[],pp:[]});
  body.appendChild(s2sec);

  block.appendChild(body);
  return block;
}

/*
  부별 섹션: [1부] 버튼(1과~5과) 클릭하면 인원 입력칸 나타남
  레이아웃: 과번호 버튼들 한 줄 | 아래에 선택된 과의 인원 입력
*/
function makeShiftSection(d,h,shift,shiftSv){
  var sec=document.createElement('div');
  sec.className='shift-section';
  sec.id='ssec_'+d+'_'+h+'_'+shift;

  var lbl=document.createElement('div');
  lbl.className='shift-label '+(shift===1?'s1':'s2');
  lbl.textContent=shift+'부';
  sec.appendChild(lbl);

  // 과 버튼 + 인원 입력 컨테이너
  var kaRow=document.createElement('div');
  kaRow.className='ka-row';

  var btns=document.createElement('div');
  btns.className='ka-btns';

  var inps=document.createElement('div');
  inps.style.cssText='display:flex;flex-direction:column;gap:4px;';

  var shiftClass=shift===1?'s1':'s2';

  for(var k=1;k<=MAX_KA;k++){
    // 과 버튼
    var isOn=shiftSv&&shiftSv.ka&&shiftSv.ka[k-1]?true:false;
    var prevPp=shiftSv&&shiftSv.pp?shiftSv.pp[k-1]:0;
    var btnId='s'+shift+'ka_'+d+'_'+h+'_'+k;
    var inpId='s'+shift+'pp_'+d+'_'+h+'_'+k;
    var rowId='s'+shift+'row_'+d+'_'+h+'_'+k;

    var btn=document.createElement('button');
    btn.id=btnId;
    btn.className='ka-btn'+(isOn?' on '+(shiftClass):'');
    btn.textContent=k+'과';
    btn.type='button';
    btns.appendChild(btn);

    // 인원 입력 행 (선택 시 표시) — createElement로 직접 구성해 참조 유지
    var inpRow=document.createElement('div');
    inpRow.id=rowId;
    inpRow.style.cssText='display:'+(isOn?'flex':'none')+';align-items:center;gap:5px;';

    var kaLbl=document.createElement('span');
    kaLbl.style.cssText='font-size:11px;color:#9490c4;white-space:nowrap;min-width:28px';
    kaLbl.textContent=k+'과';

    var kaInp=document.createElement('input');
    kaInp.type='number'; kaInp.min='0'; kaInp.id=inpId;
    kaInp.className='finput ka-inp '+shiftClass+'b';
    kaInp.value=(isOn&&prevPp)?prevPp:'';
    kaInp.placeholder='인원(명)';

    var kaUnit=document.createElement('span');
    kaUnit.style.cssText='font-size:11px;color:#9490c4';
    kaUnit.textContent='명';

    inpRow.appendChild(kaLbl);
    inpRow.appendChild(kaInp);
    inpRow.appendChild(kaUnit);
    inps.appendChild(inpRow);

    // 버튼 클릭 → 토글 (btn, inpRow, kaInp 직접 참조)
    (function(dd,hh,sf,myBtn,myRow,myInp){
      myBtn.addEventListener('click',function(){
        var on=this.classList.contains('on');
        if(on){
          this.classList.remove('on');this.classList.remove(sf===1?'s1':'s2');
          myRow.style.display='none';
          myInp.value='';
        } else {
          this.classList.add('on');this.classList.add(sf===1?'s1':'s2');
          myRow.style.display='flex';
          myInp.focus();
        }
        calcT(dd);calcHallTot(dd,hh);
      });
    })(d,h,shift,btn,inpRow,kaInp);

    // 인원 입력 변경 — kaInp 직접 참조
    (function(dd,hh,myInp){
      myInp.addEventListener('input',function(){calcT(dd);calcHallTot(dd,hh);});
    })(d,h,kaInp);
  }

  kaRow.appendChild(btns);
  kaRow.appendChild(inps);
  sec.appendChild(kaRow);
  return sec;
}

function calcHallTot(d,h){
  var tot=0;
  for(var k=1;k<=MAX_KA;k++){
    for(var sf=1;sf<=2;sf++){
      var btn=gi('s'+sf+'ka_'+d+'_'+h+'_'+k);
      if(btn&&btn.classList.contains('on')){
        tot+=iv('s'+sf+'pp_'+d+'_'+h+'_'+k);
      }
    }
  }
  var el=gi('htot_'+d+'_'+h);
  if(el)el.textContent=tot+'명';
  return tot;
}

function calcT(d){
  var s=0;
  for(var h=0;h<HC;h++) s+=calcHallTot(d,h);
  var el=gi('tot_'+d);if(el)el.textContent=s;
}

function rebuildDateHalls(){
  for(var d=0;d<DC;d++){
    var panel=gi('dp_'+d);if(!panel)continue;
    // 기존 hall-block 제거
    var old=panel.querySelectorAll('.hall-block');
    for(var i=0;i<old.length;i++)old[i].parentNode.removeChild(old[i]);
    // 새로 추가
    for(var h=0;h<HC;h++) panel.appendChild(makeHallBlock(d,h,null));
    calcT(d);
  }
}

/* 저장 */
function saveRecord(){
  if(!gHTML){toast('먼저 통보문을 생성해주세요');return;}
  var title=gi('f_title').value||'교육';
  var dept=gi('f_dept').value||'';

  var fen=gi('f_end').value||'';
  var ndate=gi('f_ndate').value||'';
  var label=dept+' '+fst+(fen&&fst!==fen?' ~ '+fen:'') +' '+title;
  var saves=getSaves();
  var rec={
    id:Date.now(),
    label:label.trim(),
    ndate:ndate,
    savedAt:new Date().toLocaleString('ko-KR'),
    html:gHTML
  };
  saves.unshift(rec); // 최신이 위
  if(saves.length>30) saves=saves.slice(0,30); // 최대 30건
  setSaves(saves);
  renderMgmt();
  toast('&#128190; 저장되었습니다!');
}

    return;
  }
  saves.forEach(function(rec){
    var card=document.createElement('div');
    card.className='mgmt-card';
    card.innerHTML=
      '<div class="mgmt-card-hdr">'+
        '<span class="mgmt-card-title">'+xss(rec.label)+'</span>'+
        '<span class="mgmt-card-date">'+xss(rec.savedAt)+'</span>'+
        '<div class="mgmt-card-acts">'+
          '<button class="mgmt-btn view" data-id="'+rec.id+'">&#128065; 보기</button>'+
          '<button class="mgmt-btn dl"   data-id="'+rec.id+'">&#8681; 다운로드</button>'+
          '<button class="mgmt-btn del"  data-id="'+rec.id+'">&#10005;</button>'+
        '</div>'+
      '</div>'+
      '<div class="mgmt-card-body">'+
        '<span class="mgmt-tag">&#128197; '+xss(rec.ndate||'-')+'</span>'+
        '<span class="mgmt-tag">'+xss(rec.label)+'</span>'+
      '</div>';
    // 보기
    card.querySelector('.mgmt-btn.view').addEventListener('click',function(){
      var id=parseInt(this.getAttribute('data-id'));
      var s=getSaves().find(function(r){return r.id===id;});
      if(!s)return;
      gHTML=s.html;
      // 미리보기 탭으로 전환
      document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('on');});
      gi('vt_preview').classList.add('on');
      gi('rcont').style.display='';
      gi('mgmtCont').style.display='none';
      cvtab='preview';
      showR();
    });
    // 다운로드
    card.querySelector('.mgmt-btn.dl').addEventListener('click',function(){
      var id=parseInt(this.getAttribute('data-id'));
      var s=getSaves().find(function(r){return r.id===id;});
      if(!s)return;
      try{
        var blob=new Blob([s.html],{type:'text/html;charset=utf-8'});
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=url;a.download='교육장_통보문_'+s.ndate+'.html';
        document.body.appendChild(a);a.click();
        setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},100);
      }catch(ex){
        var a2=document.createElement('a');a2.href='data:text/html;charset=utf-8,'+encodeURIComponent(s.html);
        a2.download='교육장_통보문_'+s.ndate+'.html';document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
      }
      toast('다운로드 시작!');
    });
    // 삭제
    card.querySelector('.mgmt-btn.del').addEventListener('click',function(){
      if(!confirm('삭제하시겠습니까?'))return;
      var id=parseInt(this.getAttribute('data-id'));
      var saves=getSaves().filter(function(r){return r.id!==id;});
      setSaves(saves);
      renderMgmt();
      toast('삭제되었습니다.');
    });
    wrap.appendChild(card);
  });
}

/* 관리탭 뷰 전환 확장 */
document.addEventListener('DOMContentLoaded',function(){
  gi('saveBtn').addEventListener('click',saveRecord);
  gi('vt_mgmt').addEventListener('click',function(){
    document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('on');});
    this.classList.add('on');
    gi('rcont').style.display='none';
    gi('mgmtCont').style.display='';
    renderMgmt();
  });
  // 미리보기/코드 탭 클릭 시 관리탭 숨김 (기존 sVtab 보완)
  ['vt_preview','vt_code'].forEach(function(id){
    gi(id).addEventListener('click',function(){
      gi('rcont').style.display='';
      gi('mgmtCont').style.display='none';
    });
  });
  // 초기 관리 목록 로드 (탭 전환 전엔 숨겨둠)
});
</script>
